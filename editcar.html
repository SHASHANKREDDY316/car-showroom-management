{% extends "base.html" %}

{% block content %}

<div class="form-container">

<h2>Edit Car</h2>

<form method="POST">

<input type="text" name="name" value="{{car.name}}" required>
<input type="text" name="model" value="{{car.model}}" required>
<input type="text" name="price" value="{{car.price}}" required>
<input type="text" name="owner" value="{{car.owner}}" required>

<button>Update</button>

</form>

</div>

{% endblock %}
